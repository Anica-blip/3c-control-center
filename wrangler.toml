# ============================================================
# Jan Assistant — Cloudflare Worker Configuration
# For deployment via Windsurf / wrangler CLI
# Built by Claude (Anthropic) × Chef Anica · 3C Thread To Success Cooking Lab 🧪👨‍🍳
# ============================================================

name = "3c-control-center"
main = "worker.js"
compatibility_date = "2024-12-09"

workers_dev = true

# ============================================================
# D1 DATABASE BINDING
# Get your Database ID from:
# Cloudflare Dashboard → D1 → your Jan database → copy ID
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "jan-db"
database_id = "79757bd7-35c2-4a7d-a028-d72a3df901fd"

# ============================================================
# R2 BUCKET BINDINGS
# ============================================================

# Control Center bucket — voices + project-specific assets
[[r2_buckets]]
binding = "VOICE_BUCKET"
bucket_name = "3c-control-center"

# ============================================================
# SECRETS — set via dashboard or wrangler CLI, NOT here
# These are already configured in your Cloudflare dashboard:
#   CLAUDE_API_KEY → set via Dashboard or: wrangler secret put CLAUDE_API_KEY
# ============================================================

# ============================================================
# CORS & ROUTES — handled inside worker.js
# ============================================================
